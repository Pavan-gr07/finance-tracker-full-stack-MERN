version: "3.8"

services:
  api:
    build: .
    container_name: finance_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://pavanadmin:pavanadmin@cluster0.hzdcr4n.mongodb.net/?appName=Cluster0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_secret
    depends_on:
      - mongo
      - redis

  budget-worker:
    build: .
    container_name: budget_worker
    command: ["node", "src/workers/budgetProcessor.js"]
    environment:
      - MONGO_URI=mongodb+srv://pavanadmin:pavanadmin@cluster0.hzdcr4n.mongodb.net/?appName=Cluster0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_secret
    depends_on:
      - mongo
      - redis

  notification-worker:
    build: .
    container_name: notification_worker
    command: ["node", "src/workers/notificationProcessor.js"]
    environment:
      - MONGO_URI=mongodb+srv://pavanadmin:pavanadmin@cluster0.hzdcr4n.mongodb.net/?appName=Cluster0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_secret
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:6
    container_name: finance_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: pavanadmin
      MONGO_INITDB_ROOT_PASSWORD: pavanadmin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db


  redis:
    image: redis:7
    container_name: finance_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data:
